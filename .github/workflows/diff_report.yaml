name: diff report

on:
  workflow_run:
    workflows: [tests]
    types: [completed]

jobs:
  comment:
    name: comment
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
    - name: Get PR number
      id: pr
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        pr_number="${{ github.event.workflow_run.pull_requests[0].number }}"
        if [ -z "$pr_number" ]; then
          pr_number=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')
        fi
        if [ -z "$pr_number" ]; then
          echo "No PR found for ${{ github.event.workflow_run.head_sha }}" >&2
          exit 1
        fi
        echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"
    - name: Download diff
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        run-id: ${{ github.event.workflow_run.id }}
        name: diff_report_${{ steps.pr.outputs.pr-number }}
        path: .
    - name: Comment on PR
      uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b
      with:
        file-path: diff_report.txt
        comment-tag: diff_report
        pr-number: ${{ steps.pr.outputs.pr-number }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

name: diff report
on:
  workflow_run:
    workflows: ["tests"]
    types: [completed]
jobs:
  comment:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      actions: read
    concurrency:
      group: diff-report-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
      cancel-in-progress: true
    steps:
    - name: Resolve PR number
      id: pr
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PR="${{ github.event.workflow_run.pull_requests[0].number }}"
        if [ -z "$PR" ]; then
          PR=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number')
        fi
        echo "number=$PR" >> "$GITHUB_OUTPUT"
    - name: Download diff
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        run_id: ${{ github.event.workflow_run.id }}
        name: diff_report_${{ steps.pr.outputs.number }}
        path: .
    - name: Comment on PR
      uses: thollander/actions-comment-pull-request@v2
      with:
        filePath: diff_report.txt
        comment_tag: diff_report
        pr_number: ${{ steps.pr.outputs.number }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
